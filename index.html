<!DOCTYPE html>
<html>
<head>
    <title>Vexa Simple</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        input, button { padding: 10px; margin: 5px; width: 100%; }
        .message { background: #f0f0f0; padding: 8px; margin: 5px 0; border-radius: 8px; }
        .my { background: #667eea; color: white; text-align: right; }
    </style>
</head>
<body>
    <div id="auth">
        <h2>Вход</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <button onclick="showRegister()">Создать аккаунт</button>
        <div id="regForm" style="display:none">
            <input type="text" id="regName" placeholder="Имя">
            <input type="text" id="regUsername" placeholder="Логин">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
        </div>
        <div id="error" style="color:red"></div>
    </div>

    <div id="app" style="display:none">
        <div id="userInfo"></div>
        <hr>
        <div id="messages"></div>
        <input type="text" id="msg" placeholder="Сообщение">
        <button onclick="send()">Отправить</button>
        <button onclick="logout()">Выйти</button>
    </div>

    <script>
        const API = 'https://vexa-backend-fqdy.onrender.com/api';
        let currentUser = null;

        async function api(path, data, token) {
            const opts = {
                method: data ? 'POST' : 'GET',
                headers: { 'Content-Type': 'application/json' }
            };
            if (data) opts.body = JSON.stringify(data);
            if (token) opts.headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(API + path, opts);
            const json = await res.json();
            if (!res.ok) throw new Error(json.error);
            return json;
        }

        window.login = async () => {
            try {
                const data = await api('/auth/login', { 
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });
                currentUser = data.user;
                localStorage.setItem('token', data.token);
                showApp();
            } catch(e) {
                document.getElementById('error').innerText = e.message;
            }
        };

        window.register = async () => {
            try {
                const data = await api('/auth/register', {
                    displayName: document.getElementById('regName').value,
                    username: document.getElementById('regUsername').value,
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value
                });
                currentUser = data.user;
                localStorage.setItem('token', data.token);
                showApp();
            } catch(e) {
                document.getElementById('error').innerText = e.message;
            }
        };

        window.showRegister = () => {
            document.getElementById('regForm').style.display = 'block';
        };

        async function loadMessages() {
            const msgs = await api('/messages', null, localStorage.getItem('token'));
            const container = document.getElementById('messages');
            container.innerHTML = msgs.map(m => `
                <div class="message ${m.from === currentUser.userid ? 'my' : ''}">
                    <strong>${m.from === currentUser.userid ? 'Я' : m.from}:</strong> ${m.text}
                </div>
            `).join('');
        }

        window.send = async () => {
            const text = document.getElementById('msg').value;
            if (!text) return;
            await api('/messages', { to: currentUser.userid, text }, localStorage.getItem('token'));
            document.getElementById('msg').value = '';
            loadMessages();
        };

        window.logout = () => {
            localStorage.removeItem('token');
            location.reload();
        };

        async function showApp() {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            const user = await api('/users', null, localStorage.getItem('token'));
            currentUser = user.find(u => u.userid === currentUser.userid);
            document.getElementById('userInfo').innerHTML = `
                <strong>${currentUser.displayname}</strong> (@${currentUser.username})
                <img src="${currentUser.avatar || ''}" style="width:40px;border-radius:50%">
            `;
            loadMessages();
            setInterval(loadMessages, 3000);
        }

        // Проверка сохранённого токена
        const token = localStorage.getItem('token');
        if (token) {
            api('/users', null, token).then(() => {
                showApp();
            }).catch(() => {
                localStorage.removeItem('token');
            });
        }
    </script>
</body>
</html>
