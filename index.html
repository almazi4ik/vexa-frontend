<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vexa Messenger — каналы, баны, стикеры</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.20.0/dist/index.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        .splash-screen.hide { opacity: 0; visibility: hidden; }
        .splash-content { animation: fadeInScale 0.5s ease-out; }
        .splash-logo { animation: gentlePulse 1.2s ease-in-out infinite; }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .app {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            position: relative;
            opacity: 0;
            transform: scale(0.97) translateY(10px);
            transition: opacity 0.6s cubic-bezier(0.34, 1.2, 0.64, 1), transform 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        .app.visible { opacity: 1; transform: scale(1) translateY(0); }
        .sidebar {
            width: 320px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        .profile {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .profile-info { flex: 1; }
        .display-name { font-weight: bold; font-size: 16px; }
        .username { font-size: 12px; color: #666; }
        .edit-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        .search {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #666;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            font-weight: bold;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        .chat-item:hover { background: #e9ecef; transform: translateX(2px); }
        .chat-item.active { background: #e3f2fd; }
        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            background-size: cover;
            position: relative;
        }
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid white;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; }
        .chat-last { font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 10px; color: #999; }
        .unread {
            background: #667eea;
            color: white;
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 11px;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .chat-header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            background-size: cover;
        }
        .typing-status {
            font-size: 12px;
            color: #667eea;
            margin-top: 2px;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .chat-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .icon-btn:hover { background: #f0f0f0; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 12px;
            display: flex;
            cursor: pointer;
            transition: background 0.1s;
            border-radius: 12px;
            padding: 4px 8px;
        }
        .message:hover { background: rgba(0,0,0,0.05); }
        .message.sent { justify-content: flex-end; }
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-break: break-word;
        }
        .message.sent .message-bubble { background: #667eea; color: white; }
        .message-text { font-size: 14px; }
        .message-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
            display: block;
        }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .message-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 8px 0;
            min-width: 160px;
            z-index: 2000;
            display: none;
        }
        .message-menu button {
            display: block;
            width: 100%;
            padding: 8px 16px;
            text-align: left;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .message-menu button:hover { background: #f0f0f0; }
        .message-menu .danger { color: #dc3545; }
        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .emoji-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            width: 44px;
            height: 44px;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .emoji-btn:active { transform: scale(0.95); }
        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        .send-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .image-preview-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .image-preview {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }
        .cancel-image {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }
        .emoji-picker-container {
            position: absolute;
            bottom: 80px;
            right: 20px;
            display: none;
            z-index: 1000;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 350px;
            height: 400px;
        }
        .emoji-picker-container.show { display: block; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e0e0e0;
            margin: 10px auto;
            background-size: cover;
            cursor: pointer;
        }
        button.btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f0f0f0; }
        .search-results {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .search-result {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .error { color: red; font-size: 12px; text-align: center; margin-top: 8px; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .message.animate-sent { animation: slideInRight 0.25s ease-out; }
        .message.animate-received { animation: slideInLeft 0.3s ease-out; }
        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .message-bubble { max-width: 85%; }
            .emoji-picker-container { width: 280px; right: 10px; }
        }
    </style>
</head>
<body>
    <div id="splash" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f0f0f0"/></linearGradient></defs>
                    <rect width="100" height="100" rx="28" fill="url(#logoGrad)" filter="url(#shadow)"/>
                    <path d="M30 35 L50 70 L70 35" stroke="#667eea" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M30 35 L50 70 L70 35" stroke="#764ba2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
                    <circle cx="30" cy="35" r="3" fill="#667eea"/>
                    <circle cx="70" cy="35" r="3" fill="#764ba2"/>
                    <defs><filter id="shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="2" dy="4"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                </svg>
            </div>
        </div>
    </div>

    <div class="app" id="app" style="display: none;">
        <div class="sidebar">
            <div class="profile">
                <div class="avatar" id="avatar"></div>
                <div class="profile-info">
                    <div class="display-name" id="displayName"></div>
                    <div class="username" id="username"></div>
                </div>
                <button class="edit-btn" onclick="openProfileModal()">✏️</button>
            </div>
            <div class="search">
                <input type="text" id="searchInput" placeholder="🔍 Найти пользователя или канал...">
                <div id="searchResults" class="search-results" style="display: none;"></div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('chats')">💬 Чаты</div>
                <div class="tab" onclick="switchTab('channels')">📢 Каналы</div>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>
        <div class="main">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-left" id="chatHeaderLeft">
                    <div class="chat-header-avatar" id="chatAvatar"></div>
                    <div>
                        <h3 id="chatName"></h3>
                        <div id="typingStatus" class="typing-status" style="display: none;">✍️ печатает...</div>
                        <p id="chatUsername" style="font-size: 12px; color: #666;"></p>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" id="chatMenuBtn" onclick="showChatMenu()">⋮</button>
                </div>
            </div>
            <div class="messages" id="messages" onclick="closeMessageMenu()"></div>
            <div class="input-area" id="inputArea" style="display: none;">
                <div id="imagePreviewContainer" class="image-preview-area" style="display: none;">
                    <img id="imagePreview" class="image-preview">
                    <button class="cancel-image" onclick="cancelImage()">✖️</button>
                </div>
                <div class="input-row">
                    <button class="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
                    <button class="emoji-btn" onclick="document.getElementById('imageInput').click()">📷</button>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." onkeyup="onTyping()">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">📤</button>
                </div>
            </div>
            <div id="emojiPickerContainer" class="emoji-picker-container"></div>
        </div>
    </div>

    <div id="messageMenu" class="message-menu">
        <button onclick="copyMessage()">📋 Копировать</button>
        <button id="editMsgBtn" onclick="editMessage()" style="display: none;">✏️ Изменить</button>
        <button id="pinMsgBtn" onclick="pinMessage()">📌 Закрепить</button>
        <button class="danger" onclick="deleteMessage()">🗑️ Удалить</button>
    </div>

    <div id="chatMenu" class="message-menu" style="min-width: 180px;">
        <button onclick="clearChat()">🗑️ Очистить чат</button>
        <button id="banUserBtn" onclick="banUser()" class="danger">🚫 Забанить</button>
        <button id="deleteChatBtn" onclick="deleteChat()" class="danger">❌ Удалить чат</button>
        <button id="pinChatBtn" onclick="pinChat()">📌 Закрепить чат</button>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="authTitle">Вход в Vexa</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button class="btn btn-primary" onclick="login()">Войти</button>
                <button class="btn btn-secondary" onclick="showRegister()">Создать аккаунт</button>
            </div>
            <div id="registerForm" style="display: none;">
                <input type="text" id="regName" placeholder="Отображаемое имя">
                <input type="text" id="regUsername" placeholder="Username">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль">
                <button class="btn btn-primary" onclick="register()">Зарегистрироваться</button>
                <button class="btn btn-secondary" onclick="showLogin()">Уже есть аккаунт?</button>
            </div>
            <div id="authError" class="error"></div>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h2>Редактировать профиль</h2>
            <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarFile').click()"></div>
            <input type="file" id="avatarFile" style="display: none;" accept="image/*" onchange="previewAvatar(this)">
            <input type="text" id="editName" placeholder="Отображаемое имя">
            <input type="text" id="editUsername" placeholder="Username">
            <textarea id="editBio" rows="3" placeholder="О себе"></textarea>
            <button class="btn btn-primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn btn-secondary" onclick="closeProfileModal()">Отмена</button>
        </div>
    </div>

    <div class="modal" id="createChannelModal">
        <div class="modal-content">
            <h2>Создать канал</h2>
            <input type="text" id="channelName" placeholder="Название канала">
            <textarea id="channelDesc" rows="2" placeholder="Описание"></textarea>
            <button class="btn btn-primary" onclick="createChannel()">Создать</button>
            <button class="btn btn-secondary" onclick="closeChannelModal()">Отмена</button>
        </div>
    </div>

    <div class="modal" id="editMessageModal">
        <div class="modal-content">
            <h2>Редактировать сообщение</h2>
            <textarea id="editMessageText" rows="3"></textarea>
            <button class="btn btn-primary" onclick="saveEditedMessage()">Сохранить</button>
            <button class="btn btn-secondary" onclick="closeEditModal()">Отмена</button>
        </div>
    </div>

    <div class="modal" id="banModal">
        <div class="modal-content">
            <h2>Забанить пользователя</h2>
            <input type="text" id="banReason" placeholder="Причина (необязательно)">
            <button class="btn btn-primary" onclick="confirmBan()">Забанить</button>
            <button class="btn btn-secondary" onclick="closeBanModal()">Отмена</button>
        </div>
    </div>

    <script type="module">
        import EmojiPicker from 'https://unpkg.com/emoji-picker-element@1.20.0/index.js';
        const picker = new EmojiPicker();
        picker.addEventListener('emoji-click', event => {
            document.getElementById('messageInput').value += event.detail.unicode;
            document.getElementById('messageInput').focus();
        });
        document.getElementById('emojiPickerContainer').appendChild(picker);
        window.toggleEmojiPicker = () => {
            document.getElementById('emojiPickerContainer').classList.toggle('show');
        };
    </script>

    <script>
        const API = 'https://vexa-backend-fqdy.onrender.com/api';
        let currentUser = null;
        let users = [];
        let messages = [];
        let channels = [];
        let currentChat = null; // { type: 'user', id } или { type: 'channel', id, name }
        let currentTab = 'chats';
        let userStatuses = {};
        let pollInterval = null;
        let selectedImageFile = null;
        let typingTimeout = null;
        let currentMessageId = null;
        let currentMessageIsOwn = false;
        let pinnedMessages = JSON.parse(localStorage.getItem('pinned_' + (currentUser?.userid || '')) || '[]');
        let pinnedChats = JSON.parse(localStorage.getItem('pinnedChats_' + (currentUser?.userid || '')) || '[]');

        setTimeout(() => {
            const splash = document.getElementById('splash');
            if (splash) { splash.classList.add('hide'); setTimeout(() => splash.style.display = 'none', 600); }
        }, 5000);

        async function apiRequest(endpoint, method = 'GET', data = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) opts.body = JSON.stringify(data);
            if (currentUser?.token) opts.headers['Authorization'] = `Bearer ${currentUser.token}`;
            const res = await fetch(API + endpoint, opts);
            const json = await res.json();
            if (!res.ok) throw new Error(json.error || 'Ошибка');
            return json;
        }

        window.onTyping = () => {
            if (!currentChat || currentChat.type !== 'user') return;
            if (typingTimeout) clearTimeout(typingTimeout);
            fetch(`${API}/typing/${currentChat.id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${currentUser.token}` } }).catch(e=>console.log);
            typingTimeout = setTimeout(() => {
                fetch(`${API}/typing/stop/${currentChat.id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${currentUser.token}` } }).catch(e=>console.log);
            }, 2000);
        };

        let lastTyping = {};
        function checkTyping() {
            if (!currentChat || currentChat.type !== 'user') { document.getElementById('typingStatus').style.display = 'none'; return; }
            const now = Date.now();
            const isTyping = lastTyping[currentChat.id] && (now - lastTyping[currentChat.id] < 3000);
            document.getElementById('typingStatus').style.display = isTyping ? 'block' : 'none';
        }
        setInterval(checkTyping, 1000);

        window.showMessageMenu = (event, msgId, isOwn, text, isPinned) => {
            event.stopPropagation();
            currentMessageId = msgId;
            currentMessageIsOwn = isOwn;
            const menu = document.getElementById('messageMenu');
            document.getElementById('editMsgBtn').style.display = isOwn ? 'block' : 'none';
            document.getElementById('pinMsgBtn').innerHTML = isPinned ? '📌 Открепить' : '📌 Закрепить';
            menu.style.display = 'block';
            menu.style.left = event.clientX + 'px';
            menu.style.top = event.clientY + 'px';
            setTimeout(() => document.addEventListener('click', closeMessageMenu), 100);
        };
        window.closeMessageMenu = () => {
            document.getElementById('messageMenu').style.display = 'none';
            document.removeEventListener('click', closeMessageMenu);
        };
        window.copyMessage = () => {
            const msg = messages.find(m => m.id == currentMessageId);
            if (msg) { navigator.clipboard.writeText(msg.text || (msg.image ? '📷 Фото' : '')); alert('Скопировано'); }
            closeMessageMenu();
        };
        window.editMessage = () => {
            const msg = messages.find(m => m.id == currentMessageId);
            if (msg) { document.getElementById('editMessageText').value = msg.text || ''; document.getElementById('editMessageModal').classList.add('active'); }
            closeMessageMenu();
        };
        window.saveEditedMessage = async () => {
            const newText = document.getElementById('editMessageText').value;
            if (!newText) return;
            try {
                await apiRequest(`/messages/${currentMessageId}`, 'PUT', { text: newText });
                await loadData();
                renderMessages();
                closeEditModal();
            } catch(e) { alert(e.message); }
        };
        window.pinMessage = () => {
            const index = pinnedMessages.indexOf(currentMessageId);
            if (index === -1) pinnedMessages.push(currentMessageId);
            else pinnedMessages.splice(index, 1);
            localStorage.setItem('pinned_' + currentUser.userid, JSON.stringify(pinnedMessages));
            renderMessages();
            closeMessageMenu();
        };
        window.deleteMessage = async () => {
            if (confirm('Удалить сообщение?')) {
                try {
                    await apiRequest(`/messages/${currentMessageId}`, 'DELETE');
                    await loadData();
                    renderMessages();
                } catch(e) { alert(e.message); }
            }
            closeMessageMenu();
        };

        window.showChatMenu = () => {
            const menu = document.getElementById('chatMenu');
            const isUser = currentChat?.type === 'user';
            document.getElementById('banUserBtn').style.display = isUser ? 'block' : 'none';
            document.getElementById('deleteChatBtn').style.display = isUser ? 'block' : 'none';
            const isPinned = pinnedChats.includes(currentChat?.type === 'user' ? `user_${currentChat.id}` : `channel_${currentChat.id}`);
            document.getElementById('pinChatBtn').innerHTML = isPinned ? '📌 Открепить чат' : '📌 Закрепить чат';
            menu.style.display = 'block';
            menu.style.right = '20px';
            menu.style.top = '70px';
            setTimeout(() => document.addEventListener('click', () => menu.style.display = 'none'), 100);
        };
        window.clearChat = async () => {
            if (confirm('Очистить все сообщения в этом чате?')) {
                try {
                    await apiRequest(`/messages/clear/${currentChat.id}`, 'DELETE');
                    await loadData();
                    renderMessages();
                } catch(e) { alert(e.message); }
            }
            document.getElementById('chatMenu').style.display = 'none';
        };
        window.banUser = () => {
            document.getElementById('banModal').classList.add('active');
            document.getElementById('chatMenu').style.display = 'none';
        };
        window.confirmBan = async () => {
            const reason = document.getElementById('banReason').value;
            try {
                await apiRequest('/bans', 'POST', { userId: currentChat.id, reason });
                alert('Пользователь забанен');
                closeBanModal();
            } catch(e) { alert(e.message); }
        };
        window.deleteChat = async () => {
            if (confirm('Удалить чат? Все сообщения будут удалены.')) {
                await clearChat();
                currentChat = null;
                document.getElementById('chatHeader').style.display = 'none';
                document.getElementById('inputArea').style.display = 'none';
                await loadData();
                renderCurrentList();
            }
        };
        window.pinChat = () => {
            const id = currentChat.type === 'user' ? `user_${currentChat.id}` : `channel_${currentChat.id}`;
            const index = pinnedChats.indexOf(id);
            if (index === -1) pinnedChats.push(id);
            else pinnedChats.splice(index, 1);
            localStorage.setItem('pinnedChats_' + currentUser.userid, JSON.stringify(pinnedChats));
            renderCurrentList();
            document.getElementById('chatMenu').style.display = 'none';
        };

        window.openChannelModal = () => { document.getElementById('createChannelModal').classList.add('active'); };
        window.closeChannelModal = () => { document.getElementById('createChannelModal').classList.remove('active'); };
        window.createChannel = async () => {
            const name = document.getElementById('channelName').value;
            const description = document.getElementById('channelDesc').value;
            if (!name) return;
            try {
                await apiRequest('/channels', 'POST', { name, description });
                alert('Канал создан');
                closeChannelModal();
                await loadData();
            } catch(e) { alert(e.message); }
        };
        window.closeEditModal = () => { document.getElementById('editMessageModal').classList.remove('active'); };
        window.closeBanModal = () => { document.getElementById('banModal').classList.remove('active'); };

        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedImageFile = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imagePreview').src = ev.target.result;
                    document.getElementById('imagePreviewContainer').style.display = 'flex';
                };
                reader.readAsDataURL(file);
            }
        });
        window.cancelImage = () => {
            selectedImageFile = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewContainer').style.display = 'none';
        };

        window.sendMessage = async () => {
            const text = document.getElementById('messageInput').value.trim();
            const file = selectedImageFile;
            if (!text && !file) return;
            if (!currentChat) return;
            const sendBtn = document.getElementById('sendBtn');
            const originalText = sendBtn.innerHTML;
            sendBtn.innerHTML = '⏳';
            sendBtn.disabled = true;
            try {
                let imageData = null;
                if (file) {
                    imageData = await new Promise(resolve => { const reader = new FileReader(); reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); });
                }
                let endpoint, body;
                if (currentChat.type === 'user') {
                    endpoint = '/messages';
                    body = { to: currentChat.id, text: text || '', image: imageData };
                } else {
                    endpoint = `/channels/${currentChat.id}/messages`;
                    body = { text: text || '', image: imageData };
                }
                await apiRequest(endpoint, 'POST', body);
                document.getElementById('messageInput').value = '';
                cancelImage();
                await loadData();
                renderMessages();
                renderCurrentList();
            } catch(e) { alert(e.message); } finally {
                sendBtn.innerHTML = originalText;
                sendBtn.disabled = false;
            }
        };

        window.login = async () => {
            try {
                const data = await apiRequest('/auth/login', 'POST', { email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value });
                currentUser = data.user; currentUser.token = data.token;
                localStorage.setItem('vexa_user', JSON.stringify(currentUser));
                pinnedMessages = JSON.parse(localStorage.getItem('pinned_' + currentUser.userid) || '[]');
                pinnedChats = JSON.parse(localStorage.getItem('pinnedChats_' + currentUser.userid) || '[]');
                document.getElementById('authModal').classList.remove('active');
                document.getElementById('app').style.display = 'flex';
                setTimeout(() => document.getElementById('app').classList.add('visible'), 50);
                await loadData();
                startPolling();
                updateUI();
            } catch(e) { document.getElementById('authError').innerText = e.message; }
        };
        window.register = async () => {
            try {
                const data = await apiRequest('/auth/register', 'POST', { displayName: document.getElementById('regName').value, username: document.getElementById('regUsername').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value });
                currentUser = data.user; currentUser.token = data.token;
                localStorage.setItem('vexa_user', JSON.stringify(currentUser));
                pinnedMessages = []; pinnedChats = [];
                document.getElementById('authModal').classList.remove('active');
                document.getElementById('app').style.display = 'flex';
                setTimeout(() => document.getElementById('app').classList.add('visible'), 50);
                await loadData();
                startPolling();
                updateUI();
            } catch(e) { document.getElementById('authError').innerText = e.message; }
        };
        window.showRegister = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; document.getElementById('authTitle').innerText = 'Регистрация'; };
        window.showLogin = () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; document.getElementById('authTitle').innerText = 'Вход в Vexa'; };

        async function loadData() {
            if (!currentUser) return;
            try {
                users = await apiRequest('/users');
                messages = await apiRequest('/messages');
                channels = await apiRequest('/channels');
                const statusData = await apiRequest('/status');
                userStatuses = {};
                statusData.forEach(u => { userStatuses[u.userid] = { isOnline: u.isonline, lastSeen: u.lastseen }; });
                renderCurrentList();
                if (currentChat) renderMessages();
            } catch(e) { console.error(e); }
        }

        function updateUI() {
            const avatarEl = document.getElementById('avatar');
            if (currentUser.avatar) { avatarEl.style.backgroundImage = `url(${currentUser.avatar})`; avatarEl.innerText = ''; }
            else { avatarEl.style.backgroundImage = ''; avatarEl.innerText = (currentUser.displayname || 'U').charAt(0).toUpperCase(); }
            document.getElementById('displayName').innerText = currentUser.displayname;
            document.getElementById('username').innerText = `@${currentUser.username}`;
        }

        window.openProfileModal = () => {
            document.getElementById('editName').value = currentUser.displayname;
            document.getElementById('editUsername').value = currentUser.username;
            document.getElementById('editBio').value = currentUser.bio || '';
            const preview = document.getElementById('avatarPreview');
            if (currentUser.avatar) preview.style.backgroundImage = `url(${currentUser.avatar})`;
            else preview.style.backgroundImage = '';
            document.getElementById('profileModal').classList.add('active');
        };
        window.closeProfileModal = () => { document.getElementById('profileModal').classList.remove('active'); window.newAvatar = null; };
        window.previewAvatar = (input) => {
            const file = input.files[0];
            if (file) { const reader = new FileReader(); reader.onload = (e) => { document.getElementById('avatarPreview').style.backgroundImage = `url(${e.target.result})`; window.newAvatar = e.target.result; }; reader.readAsDataURL(file); }
        };
        window.saveProfile = async () => {
            const displayName = document.getElementById('editName').value;
            const username = document.getElementById('editUsername').value.toLowerCase();
            const bio = document.getElementById('editBio').value;
            let avatar = currentUser.avatar;
            if (window.newAvatar) avatar = window.newAvatar;
            try {
                const updated = await apiRequest('/users/profile', 'PUT', { displayName, username, bio, avatar });
                currentUser = updated;
                localStorage.setItem('vexa_user', JSON.stringify(currentUser));
                closeProfileModal();
                await loadData();
                updateUI();
            } catch(e) { alert(e.message); }
        };

        function getDisplayName(user) { return user.displayname; }

        function getChats() {
            const userMessages = messages.filter(m => m.from === currentUser.userid || m.to === currentUser.userid);
            const chatUsers = new Set();
            userMessages.forEach(msg => {
                if (msg.from === currentUser.userid) chatUsers.add(msg.to);
                else chatUsers.add(msg.from);
            });
            const chatsList = Array.from(chatUsers).map(userId => {
                const user = users.find(u => u.userid === userId);
                if (!user) return null;
                const lastMessage = userMessages.filter(m => (m.from === userId && m.to === currentUser.userid) || (m.to === userId && m.from === currentUser.userid))
                    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
                const unreadCount = messages.filter(m => m.from === userId && m.to === currentUser.userid && !m.isRead).length;
                return { type: 'user', id: user.userid, name: user.displayname, avatar: user.avatar, lastMessage, unreadCount };
            }).filter(c => c);
            
            const channelChats = channels.map(ch => ({
                type: 'channel', id: ch.id, name: ch.name, avatar: ch.avatar, lastMessage: null, unreadCount: 0
            }));
            
            let all = [...chatsList, ...channelChats];
            all.sort((a,b) => {
                const aPinned = pinnedChats.includes(`${a.type}_${a.id}`);
                const bPinned = pinnedChats.includes(`${b.type}_${b.id}`);
                if (aPinned !== bPinned) return aPinned ? -1 : 1;
                const aTime = a.lastMessage ? new Date(a.lastMessage.createdAt) : 0;
                const bTime = b.lastMessage ? new Date(b.lastMessage.createdAt) : 0;
                return bTime - aTime;
            });
            return all;
        }

        function renderCurrentList() {
            if (currentTab === 'chats') renderChats();
            else renderChannels();
        }

        function renderChats() {
            const chats = getChats();
            const container = document.getElementById('chatsList');
            if (!chats.length) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">Нет чатов<br><button onclick="openChannelModal()" style="margin-top:10px;padding:8px 16px;background:#667eea;color:white;border:none;border-radius:20px;">📢 Создать канал</button></div>';
                return;
            }
            container.innerHTML = chats.map(chat => {
                const isActive = currentChat && currentChat.type === chat.type && currentChat.id === chat.id;
                const status = chat.type === 'user' ? userStatuses[chat.id] : null;
                const isOnline = status?.isOnline;
                let lastMessageText = 'Нет сообщений';
                if (chat.lastMessage) {
                    if (chat.lastMessage.image) lastMessageText = '📷 Фото';
                    else lastMessageText = escapeHtml(chat.lastMessage.text);
                }
                return `
                    <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectChat('${chat.type}', '${chat.id}', '${escapeHtml(chat.name)}')">
                        <div class="chat-avatar" style="${chat.avatar ? `background-image: url(${chat.avatar});` : ''}">
                            ${!chat.avatar ? (chat.name.charAt(0) || 'U') : ''}
                            ${isOnline ? '<div class="online-dot"></div>' : ''}
                        </div>
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(chat.name)}</div>
                            <div class="chat-last">${lastMessageText}</div>
                        </div>
                        <div>
                            <div class="chat-time">${chat.lastMessage ? formatTime(chat.lastMessage.createdAt) : ''}</div>
                            ${chat.unreadCount > 0 ? `<div class="unread">${chat.unreadCount}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            container.innerHTML += '<div style="padding:12px;text-align:center;"><button onclick="openChannelModal()" style="padding:8px 16px;background:#667eea;color:white;border:none;border-radius:20px;">📢 Создать канал</button></div>';
        }

        function renderChannels() {
            const container = document.getElementById('chatsList');
            if (!channels.length) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">Нет каналов<br><button onclick="openChannelModal()" style="margin-top:10px;padding:8px 16px;background:#667eea;color:white;border:none;border-radius:20px;">📢 Создать канал</button></div>';
                return;
            }
            container.innerHTML = channels.map(ch => `
                <div class="chat-item" onclick="selectChat('channel', '${ch.id}', '${escapeHtml(ch.name)}')">
                    <div class="chat-avatar" style="${ch.avatar ? `background-image: url(${ch.avatar});` : ''}">
                        ${!ch.avatar ? (ch.name.charAt(0) || 'U') : ''}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">📢 ${escapeHtml(ch.name)}</div>
                        <div class="chat-last">${escapeHtml(ch.description || 'Нет описания')}</div>
                    </div>
                </div>
            `).join('');
            container.innerHTML += '<div style="padding:12px;text-align:center;"><button onclick="openChannelModal()" style="padding:8px 16px;background:#667eea;color:white;border:none;border-radius:20px;">📢 Создать канал</button></div>';
        }

        window.selectChat = (type, id, name) => {
            currentChat = { type, id, name };
            renderMessages();
            renderCurrentList();
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            const avatarEl = document.getElementById('chatAvatar');
            const user = type === 'user' ? users.find(u => u.userid === id) : null;
            if (type === 'user' && user?.avatar) { avatarEl.style.backgroundImage = `url(${user.avatar})`; avatarEl.innerText = ''; }
            else { avatarEl.style.backgroundImage = ''; avatarEl.innerText = name.charAt(0).toUpperCase(); }
            document.getElementById('chatName').innerText = name;
            document.getElementById('chatUsername').innerHTML = type === 'user' ? `@${user?.username || ''}` : 'Канал';
            if (type === 'user') markMessagesAsRead(id);
        };

        async function markMessagesAsRead(fromId) {
            try {
                await apiRequest('/messages/read', 'POST', { from: fromId });
                await loadData();
                if (currentChat && currentChat.type === 'user' && currentChat.id === fromId) renderMessages();
            } catch(e) {}
        }

        async function renderMessages() {
            if (!currentChat) return;
            let chatMessages = [];
            if (currentChat.type === 'user') {
                chatMessages = messages.filter(m => 
                    (m.from === currentUser.userid && m.to === currentChat.id) ||
                    (m.to === currentUser.userid && m.from === currentChat.id)
                ).sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
            } else {
                const channelMsgs = await apiRequest(`/channels/${currentChat.id}/messages`);
                chatMessages = channelMsgs.sort((a,b) => new Date(a.createdat) - new Date(b.createdat));
            }
            
            const pinned = chatMessages.filter(m => pinnedMessages.includes(m.id));
            const unpinned = chatMessages.filter(m => !pinnedMessages.includes(m.id));
            chatMessages = [...pinned, ...unpinned];

            const container = document.getElementById('messages');
            if (!chatMessages.length) {
                container.innerHTML = `<div style="text-align:center;color:#999;margin-top:50px;">💬 Напишите первое сообщение</div>`;
                return;
            }
            
            container.innerHTML = chatMessages.map(msg => {
                const hasImage = msg.image && msg.image.startsWith('data:image');
                const displayText = msg.text && msg.text !== '📷 Фото' && msg.text !== '📷 Изображение' ? escapeHtml(msg.text) : '';
                const isOwn = msg.from === currentUser.userid;
                const isPinned = pinnedMessages.includes(msg.id);
                return `
                    <div class="message ${isOwn ? 'sent' : 'received'}" onclick="showMessageMenu(event, ${msg.id}, ${isOwn}, '${escapeHtml(msg.text || '').replace(/'/g, "\\'")}', ${isPinned})">
                        <div class="message-bubble">
                            ${isPinned ? '📌 ' : ''}
                            ${displayText ? `<div class="message-text">${displayText}</div>` : ''}
                            ${hasImage ? `<img src="${msg.image}" class="message-image" onclick="event.stopPropagation();window.open('${msg.image}')" loading="lazy">` : ''}
                            <div class="message-time">${formatTime(msg.createdAt || msg.createdat)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(iso) {
            const date = new Date(iso);
            const now = new Date();
            return (now - date < 86400000) ? date.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) : date.toLocaleDateString('ru-RU');
        }

        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                if (currentUser) {
                    await loadData();
                    if (currentChat) renderMessages();
                }
            }, 3000);
        }

        function searchUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('searchResults');
            if (!query) { resultsDiv.style.display = 'none'; return; }
            const results = users.filter(u => u.userid !== currentUser.userid && (u.username.includes(query) || u.displayname.toLowerCase().includes(query)));
            if (results.length) {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = results.map(u => `
                    <div class="search-result" onclick="selectChat('user', '${u.userid}', '${escapeHtml(u.displayname)}'); document.getElementById('searchInput').value=''; resultsDiv.style.display='none';">
                        <div class="chat-avatar" style="${u.avatar ? `background-image: url(${u.avatar});` : ''} width:40px;height:40px;">${!u.avatar ? u.displayname.charAt(0) : ''}</div>
                        <div><strong>${escapeHtml(u.displayname)}</strong><br><small>@${escapeHtml(u.username)}</small></div>
                    </div>
                `).join('');
            } else {
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = '<div style="padding:10px;text-align:center;">Не найдено</div>';
            }
        }

        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                if ((tab === 'chats' && i === 0) || (tab === 'channels' && i === 1)) t.classList.add('active');
                else t.classList.remove('active');
            });
            renderCurrentList();
        };

        const saved = localStorage.getItem('vexa_user');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                pinnedMessages = JSON.parse(localStorage.getItem('pinned_' + currentUser.userid) || '[]');
                pinnedChats = JSON.parse(localStorage.getItem('pinnedChats_' + currentUser.userid) || '[]');
                apiRequest('/users').then(() => {
                    document.getElementById('authModal').classList.remove('active');
                    document.getElementById('app').style.display = 'flex';
                    setTimeout(() => document.getElementById('app').classList.add('visible'), 50);
                    loadData().then(() => { updateUI(); startPolling(); });
                }).catch(() => { localStorage.removeItem('vexa_user'); document.getElementById('authModal').classList.add('active'); });
            } catch(e) { localStorage.removeItem('vexa_user'); document.getElementById('authModal').classList.add('active'); }
        } else { document.getElementById('authModal').classList.add('active'); }

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(searchUsers, 300); });
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        window.addEventListener('beforeunload', async () => { if (currentUser) { await fetch(`${API}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${currentUser.token}` } }); } });
    </script>
</body>
</html>
