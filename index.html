<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vexa Messenger — стикеры и эмодзи</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.20.0/dist/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            position: relative;
        }
        .sidebar {
            width: 350px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }
        .user-details { flex: 1; }
        .display-name { font-weight: bold; font-size: 16px; color: #333; }
        .username { font-size: 12px; color: #666; margin-top: 2px; }
        .edit-profile-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #667eea;
        }
        .search-box {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            font-weight: bold;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
            position: relative;
        }
        .chat-item:hover { background: #e9ecef; }
        .chat-item.active { background: #e3f2fd; }
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid white;
        }
        .chat-info {
            flex: 1;
            margin-left: 12px;
        }
        .chat-name {
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .friend-badge {
            font-size: 10px;
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 6px;
            border-radius: 10px;
        }
        .chat-last-message {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-time {
            font-size: 10px;
            color: #999;
        }
        .unread-badge {
            background: #667eea;
            color: white;
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 11px;
            margin-left: 8px;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            background-size: cover;
            background-position: center;
        }
        .friend-actions {
            display: flex;
            gap: 10px;
        }
        .friend-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            background: #f0f0f0;
        }
        .friend-btn.add { background: #667eea; color: white; }
        .friend-btn.remove { background: #dc3545; color: white; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        .message.sent .message-bubble { background: #667eea; color: white; }
        .message.received .message-bubble { background: white; color: #333; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-text { font-size: 14px; word-wrap: break-word; }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; }
        .message-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .emoji-button {
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            width: 44px;
            height: 44px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-button:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }
        .message-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        .send-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .emoji-picker {
            position: absolute;
            bottom: 80px;
            right: 20px;
            z-index: 1000;
            display: none;
            max-width: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border-radius: 16px;
        }
        .emoji-picker.show {
            display: block;
        }
        .sticker-panel {
            position: absolute;
            bottom: 80px;
            right: 80px;
            background: white;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            max-width: 300px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .sticker-panel.show {
            display: flex;
        }
        .sticker {
            font-size: 32px;
            cursor: pointer;
            padding: 6px;
            transition: transform 0.1s;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .sticker:hover {
            transform: scale(1.2);
            background: #e9ecef;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e0e0e0;
            margin: 10px auto;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        .search-results {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .search-result-item {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-result-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            background-size: cover;
        }
        .error-message { color: #dc3545; font-size: 12px; margin-top: 5px; text-align: center; }
        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .message-bubble { max-width: 85%; }
            .emoji-picker { max-width: 300px; right: 10px; }
            .sticker-panel { right: 10px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                <div class="user-avatar" id="currentUserAvatar" onclick="openProfileModal()">U</div>
                <div class="user-details">
                    <div class="display-name" id="currentDisplayName">Загрузка...</div>
                    <div class="username" id="currentUsername">@loading</div>
                </div>
                <button class="edit-profile-btn" onclick="openProfileModal()">✏️</button>
            </div>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="🔍 Найти пользователя..." id="searchInput">
            <div id="searchResults" class="search-results" style="display: none;"></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chats')">💬 Чаты</div>
            <div class="tab" onclick="switchTab('friends')">👥 Друзья</div>
        </div>
        <div class="chats-list" id="chatsList"></div>
    </div>
    <div class="chat-area">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="chat-header-left">
                <div class="chat-header-avatar" id="chatAvatar"></div>
                <div>
                    <h3 id="chatName">Выберите чат</h3>
                    <p id="chatUsername" style="font-size: 12px; color: #666;"></p>
                </div>
            </div>
            <div class="friend-actions" id="friendActions" style="display: none;">
                <button class="friend-btn add" id="addFriendBtn" onclick="toggleFriend()">➕ В друзья</button>
                <button class="friend-btn remove" id="removeFriendBtn" onclick="toggleFriend()" style="display: none;">➖ Удалить из друзей</button>
                <button class="friend-btn" id="customNameBtn" onclick="openCustomNameModal()">✏️ Своё имя</button>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div style="text-align: center; color: #999; margin-top: 50px;">👋 Добро пожаловать в Vexa!</div>
        </div>
        <div class="message-input-container" id="messageInputContainer" style="display: none;">
            <button class="emoji-button" id="emojiButton" onclick="toggleEmojiPicker()">😊</button>
            <input type="text" class="message-input" placeholder="Введите сообщение..." id="messageInput">
            <button class="send-button" onclick="sendMessage()">📤 Отправить</button>
        </div>
        <div id="emojiPickerContainer" class="emoji-picker"></div>
        <div id="stickerPanel" class="sticker-panel">
            <div class="sticker" onclick="addSticker('🚀')">🚀</div>
            <div class="sticker" onclick="addSticker('💜')">💜</div>
            <div class="sticker" onclick="addSticker('🔥')">🔥</div>
            <div class="sticker" onclick="addSticker('✨')">✨</div>
            <div class="sticker" onclick="addSticker('🎉')">🎉</div>
            <div class="sticker" onclick="addSticker('💪')">💪</div>
            <div class="sticker" onclick="addSticker('😎')">😎</div>
            <div class="sticker" onclick="addSticker('🥳')">🥳</div>
            <div class="sticker" onclick="addSticker('🤖')">🤖</div>
            <div class="sticker" onclick="addSticker('⭐')">⭐</div>
            <div class="sticker" onclick="addSticker('🌈')">🌈</div>
            <div class="sticker" onclick="addSticker('🎨')">🎨</div>
            <div class="sticker" onclick="addSticker('💡')">💡</div>
            <div class="sticker" onclick="addSticker('🎵')">🎵</div>
            <div class="sticker" onclick="addSticker('📸')">📸</div>
            <div class="sticker" onclick="addSticker('🍕')">🍕</div>
            <div class="sticker" onclick="addSticker('☕')">☕</div>
            <div class="sticker" onclick="addSticker('🎮')">🎮</div>
            <div class="sticker" onclick="addSticker('💻')">💻</div>
            <div class="sticker" onclick="addSticker('❤️')">❤️</div>
        </div>
    </div>
</div>

<!-- Модалки -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h2>Редактировать профиль</h2>
        <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarInput').click()"></div>
        <input type="file" id="avatarInput" style="display: none;" accept="image/*" onchange="previewAvatar(this)">
        <div class="form-group">
            <label>Отображаемое имя</label>
            <input type="text" id="editDisplayName">
        </div>
        <div class="form-group">
            <label>Username (@уникальный)</label>
            <input type="text" id="editUsername">
        </div>
        <div class="form-group">
            <label>О себе</label>
            <textarea id="editBio" rows="3"></textarea>
        </div>
        <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
        <button class="btn-secondary" onclick="closeProfileModal()">Отмена</button>
    </div>
</div>

<div class="modal" id="customNameModal">
    <div class="modal-content">
        <h2>Как назвать друга?</h2>
        <div class="form-group">
            <label>Ваше имя для этого друга</label>
            <input type="text" id="customNameInput" placeholder="Например: Лучший друг">
        </div>
        <button class="btn-primary" onclick="saveCustomName()">Сохранить</button>
        <button class="btn-secondary" onclick="closeCustomNameModal()">Отмена</button>
    </div>
</div>

<div class="modal active" id="authModal">
    <div class="modal-content">
        <h2 id="authTitle">Вход в Vexa</h2>
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword">
            </div>
            <button class="btn-primary" onclick="login()">Войти</button>
            <button class="btn-secondary" onclick="showRegister()">Создать аккаунт</button>
        </div>
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label>Отображаемое имя</label>
                <input type="text" id="regDisplayName">
            </div>
            <div class="form-group">
                <label>Username (@уникальный)</label>
                <input type="text" id="regUsername">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="regPassword">
            </div>
            <button class="btn-primary" onclick="register()">Зарегистрироваться</button>
            <button class="btn-secondary" onclick="showLogin()">Уже есть аккаунт? Войти</button>
        </div>
        <div id="authError" class="error-message"></div>
        <div style="font-size: 11px; text-align: center; margin-top: 15px; color: #666;">📧 Email должен быть настоящим (name@mail.com)</div>
    </div>
</div>

<script type="module">
    import EmojiPicker from 'https://unpkg.com/emoji-picker-element@1.20.0/index.js';

    const API_URL = 'https://vexa-backend-fqdy.onrender.com/api';

    let currentUser = null;
    let users = [];
    let messages = [];
    let currentChatUser = null;
    let pollInterval = null;
    let currentTab = 'chats';
    let userStatuses = {};
    let emojiPicker = null;

    function initEmojiPicker() {
        const pickerContainer = document.getElementById('emojiPickerContainer');
        emojiPicker = new EmojiPicker();
        pickerContainer.appendChild(emojiPicker);

        emojiPicker.addEventListener('emoji-click', event => {
            const emoji = event.detail.unicode;
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
            toggleEmojiPicker();
        });
    }

    window.toggleEmojiPicker = function() {
        const picker = document.getElementById('emojiPickerContainer');
        const stickerPanel = document.getElementById('stickerPanel');
        picker.classList.toggle('show');
        stickerPanel.classList.remove('show');
    }

    window.toggleStickerPanel = function() {
        const stickerPanel = document.getElementById('stickerPanel');
        const picker = document.getElementById('emojiPickerContainer');
        stickerPanel.classList.toggle('show');
        picker.classList.remove('show');
    }

    window.addSticker = function(sticker) {
        const input = document.getElementById('messageInput');
        input.value += sticker;
        input.focus();
        document.getElementById('stickerPanel').classList.remove('show');
    }

    async function apiRequest(endpoint, method = 'GET', data = null) {
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' }
        };
        if (data) options.body = JSON.stringify(data);
        if (currentUser?.token) {
            options.headers['Authorization'] = `Bearer ${currentUser.token}`;
        }
        const res = await fetch(`${API_URL}${endpoint}`, options);
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Ошибка');
        return json;
    }

    window.login = async function() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            const data = await apiRequest('/auth/login', 'POST', { email, password });
            currentUser = data.user;
            currentUser.token = data.token;
            localStorage.setItem('vexa_user', JSON.stringify(currentUser));
            document.getElementById('authModal').classList.remove('active');
            await loadData();
            startPolling();
            updateUI();
        } catch (err) {
            document.getElementById('authError').innerText = err.message;
        }
    }

    window.register = async function() {
        const displayName = document.getElementById('regDisplayName').value;
        const username = document.getElementById('regUsername').value.toLowerCase();
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        try {
            const data = await apiRequest('/auth/register', 'POST', { displayName, username, email, password });
            currentUser = data.user;
            currentUser.token = data.token;
            localStorage.setItem('vexa_user', JSON.stringify(currentUser));
            document.getElementById('authModal').classList.remove('active');
            await loadData();
            startPolling();
            updateUI();
        } catch (err) {
            document.getElementById('authError').innerText = err.message;
        }
    }

    window.showRegister = function() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('authTitle').innerText = 'Регистрация';
    }
    window.showLogin = function() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('authTitle').innerText = 'Вход в Vexa';
    }

    async function loadData() {
        if (!currentUser) return;
        try {
            users = await apiRequest('/users');
            messages = await apiRequest('/messages');
            const statusData = await apiRequest('/status');
            userStatuses = {};
            statusData.forEach(u => { userStatuses[u.userID] = { isOnline: u.isOnline, lastSeen: u.lastSeen }; });
            renderCurrentList();
            if (currentChatUser) renderMessages();
        } catch(e) { console.error(e); }
    }

    async function saveProfile() {
        const displayName = document.getElementById('editDisplayName').value;
        const username = document.getElementById('editUsername').value.toLowerCase();
        const bio = document.getElementById('editBio').value;
        let avatar = currentUser.avatar;
        if (window.newAvatar) avatar = window.newAvatar;
        try {
            const updated = await apiRequest('/users/profile', 'PUT', { displayName, username, bio, avatar });
            currentUser = updated;
            localStorage.setItem('vexa_user', JSON.stringify(currentUser));
            closeProfileModal();
            await loadData();
            updateUI();
        } catch(err) { alert(err.message); }
    }

    window.previewAvatar = function(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('avatarPreview').style.backgroundImage = `url(${e.target.result})`;
                window.newAvatar = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    window.openProfileModal = function() {
        document.getElementById('editDisplayName').value = currentUser.displayName;
        document.getElementById('editUsername').value = currentUser.username;
        document.getElementById('editBio').value = currentUser.bio || '';
        const preview = document.getElementById('avatarPreview');
        if (currentUser.avatar) {
            preview.style.backgroundImage = `url(${currentUser.avatar})`;
        } else {
            preview.style.backgroundImage = '';
            preview.style.background = '#e0e0e0';
        }
        document.getElementById('profileModal').classList.add('active');
    }
    window.closeProfileModal = function() {
        document.getElementById('profileModal').classList.remove('active');
        window.newAvatar = null;
    }

    function updateUI() {
        const avatarEl = document.getElementById('currentUserAvatar');
        if (currentUser.avatar) {
            avatarEl.style.backgroundImage = `url(${currentUser.avatar})`;
            avatarEl.style.backgroundSize = 'cover';
            avatarEl.innerText = '';
        } else {
            avatarEl.style.backgroundImage = '';
            avatarEl.innerText = currentUser.displayName.charAt(0).toUpperCase();
        }
        document.getElementById('currentDisplayName').innerText = currentUser.displayName;
        document.getElementById('currentUsername').innerText = `@${currentUser.username}`;
    }

    function isFriend(userId) {
        return currentUser.friends?.includes(userId) || false;
    }

    window.toggleFriend = async function() {
        if (!currentChatUser) return;
        const isFriendNow = isFriend(currentChatUser.userID);
        const action = isFriendNow ? 'remove' : 'add';
        try {
            await apiRequest('/users/friends', 'POST', { friendId: currentChatUser.userID, action });
            await loadData();
            updateFriendButtons();
        } catch(err) { alert(err.message); }
    }

    function updateFriendButtons() {
        if (!currentChatUser) return;
        const isFriendNow = isFriend(currentChatUser.userID);
        document.getElementById('addFriendBtn').style.display = isFriendNow ? 'none' : 'inline-block';
        document.getElementById('removeFriendBtn').style.display = isFriendNow ? 'inline-block' : 'none';
    }

    window.openCustomNameModal = function() {
        const currentName = currentUser.customNames?.[currentChatUser?.userID] || '';
        document.getElementById('customNameInput').value = currentName;
        document.getElementById('customNameModal').classList.add('active');
    }
    window.closeCustomNameModal = function() {
        document.getElementById('customNameModal').classList.remove('active');
    }
    window.saveCustomName = async function() {
        const customName = document.getElementById('customNameInput').value;
        try {
            await apiRequest('/users/custom-name', 'POST', { friendId: currentChatUser.userID, customName });
            await loadData();
            closeCustomNameModal();
            renderCurrentList();
            updateChatHeader();
        } catch(err) { alert(err.message); }
    }

    function getDisplayNameForUser(user) {
        if (user.userID === currentUser.userID) return user.displayName;
        const customName = currentUser.customNames?.[user.userID];
        if (customName) return customName;
        return user.displayName;
    }

    function getChats() {
        const userMessages = messages.filter(m => m.from === currentUser.userID || m.to === currentUser.userID);
        const chatUsers = new Set();
        userMessages.forEach(msg => {
            if (msg.from === currentUser.userID) chatUsers.add(msg.to);
            else chatUsers.add(msg.from);
        });
        chatUsers.add(currentUser.userID);

        return Array.from(chatUsers).map(userId => {
            const user = users.find(u => u.userID === userId);
            if (!user && userId !== currentUser.userID) return null;
            const isSelf = userId === currentUser.userID;
            const displayUser = isSelf ? { ...currentUser, displayName: '📝 Заметки', username: 'saved' } : user;
            const lastMessage = userMessages.filter(m => (m.from === userId && m.to === currentUser.userID) || (m.to === userId && m.from === currentUser.userID))
                .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
            const unreadCount = messages.filter(m => m.from === userId && m.to === currentUser.userID && !m.isRead).length;
            return { user: displayUser, lastMessage, unreadCount, isSelf };
        }).filter(c => c);
    }

    function getFriends() {
        const friendIds = currentUser.friends || [];
        return friendIds.map(fid => users.find(u => u.userID === fid)).filter(u => u);
    }

    function renderCurrentList() {
        if (currentTab === 'chats') {
            renderChats();
        } else {
            renderFriendsList();
        }
    }

    function renderChats() {
        const chats = getChats();
        const container = document.getElementById('chatsList');
        if (!chats.length) {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">Нет чатов<br>Найдите пользователя</div>';
            return;
        }
        container.innerHTML = chats.map(chat => {
            const isActive = currentChatUser && ((chat.isSelf && currentChatUser.userID === currentUser.userID) || (!chat.isSelf && currentChatUser?.userID === chat.user.userID));
            const avatarUrl = chat.user.avatar;
            const status = userStatuses[chat.user.userID];
            const isOnline = status?.isOnline;
            const displayName = chat.isSelf ? '📝 Заметки' : getDisplayNameForUser(chat.user);
            return `
                <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectChat('${chat.user.userID}', ${chat.isSelf})">
                    <div class="chat-avatar" style="${avatarUrl ? `background-image: url(${avatarUrl}); background-size: cover;` : ''}">
                        ${!avatarUrl ? (displayName.charAt(0).toUpperCase() || 'U') : ''}
                        ${isOnline && !chat.isSelf ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${escapeHtml(displayName)}
                            ${chat.isSelf ? '<span class="friend-badge">📝 Только для вас</span>' : ''}
                        </div>
                        <div class="chat-last-message">${chat.lastMessage ? escapeHtml(chat.lastMessage.text) : 'Нет сообщений'}</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="chat-time">${chat.lastMessage ? formatTime(chat.lastMessage.createdAt) : ''}</div>
                        ${chat.unreadCount > 0 ? `<div class="unread-badge">${chat.unreadCount}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderFriendsList() {
        const friends = getFriends();
        const container = document.getElementById('chatsList');
        if (!friends.length) {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">👥 У вас пока нет друзей<br>Найдите пользователя и добавьте в друзья</div>';
            return;
        }
        container.innerHTML = friends.map(friend => {
            const status = userStatuses[friend.userID];
            const isOnline = status?.isOnline;
            const customName = currentUser.customNames?.[friend.userID];
            return `
                <div class="chat-item" onclick="selectChat('${friend.userID}', false)">
                    <div class="chat-avatar" style="${friend.avatar ? `background-image: url(${friend.avatar}); background-size: cover;` : ''}">
                        ${!friend.avatar ? (friend.displayName.charAt(0).toUpperCase()) : ''}
                        ${isOnline ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${escapeHtml(customName || friend.displayName)}
                            <span class="friend-badge">@${escapeHtml(friend.username)}</span>
                        </div>
                        <div class="chat-last-message">${friend.bio || 'Нет описания'}</div>
                    </div>
                    <button class="friend-btn remove" onclick="event.stopPropagation(); removeFriend('${friend.userID}')" style="padding: 4px 8px;">➖</button>
                </div>
            `;
        }).join('');
    }

    window.removeFriend = async function(userId) {
        try {
            await apiRequest('/users/friends', 'POST', { friendId: userId, action: 'remove' });
            await loadData();
        } catch(err) { alert(err.message); }
    }

    window.selectChat = function(userId, isSelf = false) {
        if (isSelf || userId === currentUser.userID) {
            currentChatUser = { userID: currentUser.userID, displayName: '📝 Заметки', username: 'saved', avatar: null, isSelf: true };
        } else {
            currentChatUser = users.find(u => u.userID === userId);
            if (!currentChatUser) return;
            currentChatUser.isSelf = false;
        }
        renderMessages();
        renderCurrentList();
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('messageInputContainer').style.display = 'flex';
        updateChatHeader();
        updateFriendButtons();
        document.getElementById('friendActions').style.display = currentChatUser.isSelf ? 'none' : 'flex';
        markMessagesAsRead(userId);
    }

    function updateChatHeader() {
        const user = currentChatUser;
        const isSelf = user?.isSelf || user?.userID === currentUser.userID;
        const displayName = isSelf ? '📝 Заметки' : getDisplayNameForUser(user);
        const avatarUrl = user?.avatar;
        const avatarEl = document.getElementById('chatAvatar');
        if (avatarUrl) {
            avatarEl.style.backgroundImage = `url(${avatarUrl})`;
            avatarEl.style.backgroundSize = 'cover';
            avatarEl.innerText = '';
        } else {
            avatarEl.style.backgroundImage = '';
            avatarEl.innerText = displayName.charAt(0).toUpperCase();
        }
        document.getElementById('chatName').innerText = displayName;
        document.getElementById('chatUsername').innerHTML = isSelf ? 'Ваши личные заметки' : `@${user?.username}`;
    }

    async function markMessagesAsRead(fromId) {
        try {
            await apiRequest('/messages/read', 'POST', { from: fromId });
            await loadData();
            renderCurrentList();
            if (currentChatUser && (currentChatUser.userID === fromId || (fromId === currentUser.userID && currentChatUser.isSelf))) {
                renderMessages();
            }
        } catch(e) {}
    }

    function renderMessages() {
        if (!currentChatUser) return;
        const isSelfChat = currentChatUser.isSelf || currentChatUser.userID === currentUser.userID;
        const chatMessages = messages.filter(m => 
            (m.from === currentUser.userID && m.to === (isSelfChat ? currentUser.userID : currentChatUser.userID)) ||
            (m.to === currentUser.userID && m.from === (isSelfChat ? currentUser.userID : currentChatUser.userID))
        ).sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));

        const container = document.getElementById('messagesContainer');
        if (!chatMessages.length) {
            container.innerHTML = '<div style="text-align:center;color:#999;margin-top:50px;">' + 
                (isSelfChat ? '📝 Пишите сюда заметки, ссылки, идеи' : '💬 Напишите первое сообщение') + '</div>';
            return;
        }
        container.innerHTML = chatMessages.map(msg => `
            <div class="message ${msg.from === currentUser.userID ? 'sent' : 'received'}">
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${formatTime(msg.createdAt)}</div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    window.sendMessage = async function() {
        const text = document.getElementById('messageInput').value.trim();
        if (!text || !currentChatUser) return;
        const toId = currentChatUser.isSelf ? currentUser.userID : currentChatUser.userID;
        try {
            const msg = await apiRequest('/messages', 'POST', { to: toId, text });
            messages.push(msg);
            document.getElementById('messageInput').value = '';
            renderMessages();
            renderCurrentList();
            await loadData();
        } catch(err) { alert(err.message); }
    }

    function formatTime(iso) {
        const date = new Date(iso);
        const now = new Date();
        return (now - date < 86400000) ? date.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) : date.toLocaleDateString('ru-RU');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function searchUsers() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const resultsDiv = document.getElementById('searchResults');
        if (!query) { resultsDiv.style.display = 'none'; return; }
        const results = users.filter(u => u.userID !== currentUser.userID && u.username.includes(query));
        if (results.length) {
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = results.map(u => `
                <div class="search-result-item" onclick="selectChat('${u.userID}', false); document.getElementById('searchInput').value=''; resultsDiv.style.display='none';">
                    <div class="search-result-avatar" style="${u.avatar ? `background-image: url(${u.avatar}); background-size: cover;` : ''}">
                        ${!u.avatar ? u.displayName.charAt(0).toUpperCase() : ''}
                    </div>
                    <div>
                        <strong>${escapeHtml(u.displayName)}</strong><br>
                        <small>@${escapeHtml(u.username)}</small>
                    </div>
                </div>
            `).join('');
        } else {
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div style="padding:10px;text-align:center;color:#999;">Не найдено</div>';
        }
    }

    window.switchTab = function(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach((t, i) => {
            if ((tab === 'chats' && i === 0) || (tab === 'friends' && i === 1)) {
                t.classList.add('active');
            } else {
                t.classList.remove('active');
            }
        });
        renderCurrentList();
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            if (currentUser) {
                await loadData();
                if (currentChatUser) renderMessages();
            }
        }, 3000);
    }

    // Инициализация
    const saved = localStorage.getItem('vexa_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        document.getElementById('authModal').classList.remove('active');
        loadData().then(() => { updateUI(); startPolling(); });
    }

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(searchUsers, 300);
    });
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    window.addEventListener('beforeunload', async () => {
        if (currentUser) {
            await fetch(`${API_URL}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${currentUser.token}` } });
        }
    });

    initEmojiPicker();

    const emojiButton = document.getElementById('emojiButton');
    const stickerBtn = document.createElement('button');
    stickerBtn.className = 'emoji-button';
    stickerBtn.innerHTML = '🎨';
    stickerBtn.onclick = () => toggleStickerPanel();
    emojiButton.parentNode.insertBefore(stickerBtn, emojiButton.nextSibling);
</script>
</body>
</html>
