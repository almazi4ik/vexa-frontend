<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vexa Messenger — с анимациями и Alpine.js</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.20.0/dist/index.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            position: relative;
        }
        .sidebar {
            width: 320px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }
        .profile {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            transition: transform 0.2s;
        }
        .avatar:active { transform: scale(0.95); }
        .profile-info { flex: 1; }
        .display-name { font-weight: bold; font-size: 16px; }
        .username { font-size: 12px; color: #666; }
        .edit-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .edit-btn:active { transform: scale(0.9); }
        .search {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            transition: all 0.2s;
        }
        .search input:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            font-weight: bold;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        .chat-item:hover { background: #e9ecef; transform: translateX(2px); }
        .chat-item.active { background: #e3f2fd; }
        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            background-size: cover;
            position: relative;
            transition: transform 0.1s;
        }
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid white;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; }
        .chat-last { font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 10px; color: #999; }
        .unread {
            background: #667eea;
            color: white;
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 11px;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .chat-header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            background-size: cover;
            transition: transform 0.2s;
        }
        .friend-actions {
            display: flex;
            gap: 8px;
        }
        .friend-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.1s;
        }
        .friend-btn:active { transform: scale(0.95); }
        .friend-btn.add { background: #667eea; color: white; }
        .friend-btn.remove { background: #dc3545; color: white; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 12px;
            display: flex;
            will-change: transform, opacity;
        }
        .message.sent { justify-content: flex-end; }
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-break: break-word;
        }
        .message.sent .message-bubble { background: #667eea; color: white; }
        .message-text { font-size: 14px; }
        .message-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
            display: block;
        }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .emoji-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            width: 44px;
            height: 44px;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .emoji-btn:active { transform: scale(0.95); }
        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: all 0.2s;
        }
        .message-input:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
        .send-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .send-btn:active { transform: scale(0.95); }
        .image-preview-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .image-preview {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }
        .cancel-image {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }
        .emoji-picker-container {
            position: absolute;
            bottom: 80px;
            right: 20px;
            display: none;
            z-index: 1000;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 350px;
            height: 400px;
        }
        .emoji-picker-container.show { display: block; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal.active .modal-content { transform: scale(1); }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e0e0e0;
            margin: 10px auto;
            background-size: cover;
            cursor: pointer;
        }
        button.btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
        }
        button.btn:active { transform: scale(0.98); }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f0f0f0; }
        .search-results {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .search-result {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.1s;
        }
        .search-result:active { transform: scale(0.98); background: #f0f0f0; }
        .error { color: red; font-size: 12px; text-align: center; margin-top: 8px; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.animate-sent { animation: slideInRight 0.25s ease-out; }
        .message.animate-received { animation: slideInLeft 0.3s ease-out; }
        .chat-item { transition: all 0.2s; }
        .sidebar, .main { transition: all 0.2s; }
        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .message-bubble { max-width: 85%; }
            .emoji-picker-container { width: 280px; right: 10px; }
        }
    </style>
</head>
<body>
<div class="app" id="app" style="display: none;">
    <div class="sidebar">
        <div class="profile">
            <div class="avatar" id="avatar" @click="openProfileModal()"></div>
            <div class="profile-info">
                <div class="display-name" id="displayName"></div>
                <div class="username" id="username"></div>
            </div>
            <button class="edit-btn" @click="openProfileModal()">✏️</button>
        </div>
        <div class="search">
            <input type="text" id="searchInput" placeholder="🔍 Найти пользователя...">
            <div id="searchResults" class="search-results" style="display: none;"></div>
        </div>
        <div class="tabs">
            <div class="tab" :class="{ active: currentTab === 'chats' }" @click="switchTab('chats')">💬 Чаты</div>
            <div class="tab" :class="{ active: currentTab === 'friends' }" @click="switchTab('friends')">👥 Друзья</div>
        </div>
        <div class="chats-list" id="chatsList"></div>
    </div>
    <div class="main">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="chat-header-left">
                <div class="chat-header-avatar" id="chatAvatar"></div>
                <div>
                    <h3 id="chatName"></h3>
                    <p id="chatUsername" style="font-size: 12px; color: #666;"></p>
                </div>
            </div>
            <div class="friend-actions" id="friendActions">
                <button class="friend-btn add" id="addFriendBtn" @click="toggleFriend()">➕ В друзья</button>
                <button class="friend-btn remove" id="removeFriendBtn" @click="toggleFriend()" style="display: none;">➖ Удалить</button>
                <button class="friend-btn" @click="openCustomNameModal()">✏️ Своё имя</button>
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area" id="inputArea" style="display: none;">
            <div id="imagePreviewContainer" class="image-preview-area" style="display: none;">
                <img id="imagePreview" class="image-preview">
                <button class="cancel-image" @click="cancelImage()">✖️</button>
            </div>
            <div class="input-row">
                <div class="input-buttons">
                    <button class="emoji-btn" @click="toggleEmojiPicker()">😊</button>
                    <button class="emoji-btn" @click="document.getElementById('imageInput').click()">📷</button>
                </div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
                <button class="send-btn" id="sendBtn" @click="sendMessage()">📤</button>
            </div>
        </div>
        <div id="emojiPickerContainer" class="emoji-picker-container"></div>
    </div>
</div>

<div class="modal" id="authModal">
    <div class="modal-content">
        <h2 id="authTitle">Вход в Vexa</h2>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button class="btn btn-primary" @click="login()">Войти</button>
            <button class="btn btn-secondary" @click="showRegister()">Создать аккаунт</button>
        </div>
        <div id="registerForm" style="display: none;">
            <input type="text" id="regName" placeholder="Отображаемое имя">
            <input type="text" id="regUsername" placeholder="Username (латиница)">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button class="btn btn-primary" @click="register()">Зарегистрироваться</button>
            <button class="btn btn-secondary" @click="showLogin()">Уже есть аккаунт?</button>
        </div>
        <div id="authError" class="error"></div>
    </div>
</div>

<div class="modal" id="profileModal">
    <div class="modal-content">
        <h2>Редактировать профиль</h2>
        <div class="avatar-preview" id="avatarPreview" @click="document.getElementById('avatarFile').click()"></div>
        <input type="file" id="avatarFile" style="display: none;" accept="image/*" @change="previewAvatar(this)">
        <input type="text" id="editName" placeholder="Отображаемое имя">
        <input type="text" id="editUsername" placeholder="Username">
        <textarea id="editBio" rows="3" placeholder="О себе"></textarea>
        <button class="btn btn-primary" @click="saveProfile()">Сохранить</button>
        <button class="btn btn-secondary" @click="closeProfileModal()">Отмена</button>
    </div>
</div>

<div class="modal" id="customNameModal">
    <div class="modal-content">
        <h2>Как назвать друга?</h2>
        <input type="text" id="customNameInput" placeholder="Имя для друга">
        <button class="btn btn-primary" @click="saveCustomName()">Сохранить</button>
        <button class="btn btn-secondary" @click="closeCustomNameModal()">Отмена</button>
    </div>
</div>

<script type="module">
    import EmojiPicker from 'https://unpkg.com/emoji-picker-element@1.20.0/index.js';
    const picker = new EmojiPicker();
    picker.addEventListener('emoji-click', event => {
        const input = document.getElementById('messageInput');
        input.value += event.detail.unicode;
        input.focus();
    });
    document.getElementById('emojiPickerContainer').appendChild(picker);
    window.toggleEmojiPicker = () => {
        const container = document.getElementById('emojiPickerContainer');
        container.classList.toggle('show');
    };
</script>

<script>
    const API = 'https://vexa-backend-fqdy.onrender.com/api';
    let currentUser = null;
    let users = [];
    let messages = [];
    let currentChat = null;
    let currentTab = 'chats';
    let userStatuses = {};
    let pollInterval = null;
    let selectedImageFile = null;

    async function apiRequest(endpoint, method = 'GET', data = null) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (data) opts.body = JSON.stringify(data);
        if (currentUser?.token) opts.headers['Authorization'] = `Bearer ${currentUser.token}`;
        const res = await fetch(API + endpoint, opts);
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Ошибка');
        return json;
    }

    document.getElementById('imageInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            selectedImageFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const preview = document.getElementById('imagePreview');
                preview.src = ev.target.result;
                document.getElementById('imagePreviewContainer').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }
    });

    window.cancelImage = () => {
        selectedImageFile = null;
        document.getElementById('imageInput').value = '';
        document.getElementById('imagePreviewContainer').style.display = 'none';
    };

    window.sendMessage = async () => {
        const text = document.getElementById('messageInput').value.trim();
        const file = selectedImageFile;
        
        if (!text && !file) return;
        if (!currentChat) return;
        
        const toId = currentChat.isSelf ? currentUser.userid : currentChat.userid;
        
        const sendBtn = document.getElementById('sendBtn');
        const originalText = sendBtn.innerHTML;
        sendBtn.innerHTML = '⏳';
        sendBtn.disabled = true;
        
        try {
            let imageData = null;
            if (file) {
                imageData = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }
            
            const msg = await apiRequest('/messages', 'POST', { 
                to: toId, 
                text: text || (file ? '' : ''),
                image: imageData 
            });
            messages.push(msg);
            document.getElementById('messageInput').value = '';
            cancelImage();
            renderMessages();
            renderCurrentList();
            await loadData();
        } catch(e) { 
            alert(e.message); 
        } finally {
            sendBtn.innerHTML = originalText;
            sendBtn.disabled = false;
        }
    };

    window.login = async () => {
        try {
            const data = await apiRequest('/auth/login', 'POST', {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            });
            currentUser = data.user;
            currentUser.token = data.token;
            localStorage.setItem('vexa_user', JSON.stringify(currentUser));
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('app').style.display = 'flex';
            await loadData();
            startPolling();
            updateUI();
        } catch(e) {
            document.getElementById('authError').innerText = e.message;
        }
    };

    window.register = async () => {
        try {
            const data = await apiRequest('/auth/register', 'POST', {
                displayName: document.getElementById('regName').value,
                username: document.getElementById('regUsername').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            });
            currentUser = data.user;
            currentUser.token = data.token;
            localStorage.setItem('vexa_user', JSON.stringify(currentUser));
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('app').style.display = 'flex';
            await loadData();
            startPolling();
            updateUI();
        } catch(e) {
            document.getElementById('authError').innerText = e.message;
        }
    };

    window.showRegister = () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('authTitle').innerText = 'Регистрация';
    };
    window.showLogin = () => {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('authTitle').innerText = 'Вход в Vexa';
    };

    async function loadData() {
        if (!currentUser) return;
        try {
            users = await apiRequest('/users');
            messages = await apiRequest('/messages');
            const statusData = await apiRequest('/status');
            userStatuses = {};
            statusData.forEach(u => { userStatuses[u.userid] = { isOnline: u.isonline, lastSeen: u.lastseen }; });
            renderCurrentList();
            if (currentChat) renderMessages();
        } catch(e) { console.error(e); }
    }

    function updateUI() {
        const avatarEl = document.getElementById('avatar');
        if (currentUser.avatar) {
            avatarEl.style.backgroundImage = `url(${currentUser.avatar})`;
            avatarEl.innerText = '';
        } else {
            avatarEl.style.backgroundImage = '';
            avatarEl.innerText = (currentUser.displayname || 'U').charAt(0).toUpperCase();
        }
        document.getElementById('displayName').innerText = currentUser.displayname;
        document.getElementById('username').innerText = `@${currentUser.username}`;
    }

    window.openProfileModal = () => {
        document.getElementById('editName').value = currentUser.displayname;
        document.getElementById('editUsername').value = currentUser.username;
        document.getElementById('editBio').value = currentUser.bio || '';
        const preview = document.getElementById('avatarPreview');
        if (currentUser.avatar) preview.style.backgroundImage = `url(${currentUser.avatar})`;
        else preview.style.backgroundImage = '';
        document.getElementById('profileModal').classList.add('active');
    };
    window.closeProfileModal = () => {
        document.getElementById('profileModal').classList.remove('active');
        window.newAvatar = null;
    };
    window.previewAvatar = (input) => {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('avatarPreview').style.backgroundImage = `url(${e.target.result})`;
                window.newAvatar = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    };
    window.saveProfile = async () => {
        const displayName = document.getElementById('editName').value;
        const username = document.getElementById('editUsername').value.toLowerCase();
        const bio = document.getElementById('editBio').value;
        let avatar = currentUser.avatar;
        if (window.newAvatar) avatar = window.newAvatar;
        try {
            const updated = await apiRequest('/users/profile', 'PUT', { displayName, username, bio, avatar });
            currentUser = updated;
            localStorage.setItem('vexa_user', JSON.stringify(currentUser));
            closeProfileModal();
            await loadData();
            updateUI();
        } catch(e) { alert(e.message); }
    };

    function isFriend(userId) {
        return currentUser.friends?.includes(userId) || false;
    }
    window.toggleFriend = async () => {
        if (!currentChat) return;
        const action = isFriend(currentChat.userid) ? 'remove' : 'add';
        try {
            await apiRequest('/users/friends', 'POST', { friendId: currentChat.userid, action });
            await loadData();
            updateFriendButtons();
        } catch(e) { alert(e.message); }
    };
    function updateFriendButtons() {
        if (!currentChat) return;
        const isF = isFriend(currentChat.userid);
        document.getElementById('addFriendBtn').style.display = isF ? 'none' : 'inline-block';
        document.getElementById('removeFriendBtn').style.display = isF ? 'inline-block' : 'none';
    }

    window.openCustomNameModal = () => {
        const name = currentUser.customnames?.[currentChat?.userid] || '';
        document.getElementById('customNameInput').value = name;
        document.getElementById('customNameModal').classList.add('active');
    };
    window.closeCustomNameModal = () => {
        document.getElementById('customNameModal').classList.remove('active');
    };
    window.saveCustomName = async () => {
        const customName = document.getElementById('customNameInput').value;
        try {
            await apiRequest('/users/custom-name', 'POST', { friendId: currentChat.userid, customName });
            await loadData();
            closeCustomNameModal();
            renderCurrentList();
            updateChatHeader();
        } catch(e) { alert(e.message); }
    };

    function getDisplayName(user) {
        if (user.userid === currentUser.userid) return user.displayname;
        return currentUser.customnames?.[user.userid] || user.displayname;
    }

    function getChats() {
        const userMessages = messages.filter(m => m.from === currentUser.userid || m.to === currentUser.userid);
        const chatUsers = new Set();
        userMessages.forEach(msg => {
            if (msg.from === currentUser.userid) chatUsers.add(msg.to);
            else chatUsers.add(msg.from);
        });
        chatUsers.add(currentUser.userid);
        return Array.from(chatUsers).map(userId => {
            const user = users.find(u => u.userid === userId);
            if (!user && userId !== currentUser.userid) return null;
            const isSelf = userId === currentUser.userid;
            const displayUser = isSelf ? { ...currentUser, displayname: '📝 Заметки', username: 'saved' } : user;
            const lastMessage = userMessages.filter(m => (m.from === userId && m.to === currentUser.userid) || (m.to === userId && m.from === currentUser.userid))
                .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
            const unreadCount = messages.filter(m => m.from === userId && m.to === currentUser.userid && !m.isRead).length;
            return { user: displayUser, lastMessage, unreadCount, isSelf };
        }).filter(c => c);
    }

    function getFriends() {
        return (currentUser.friends || []).map(fid => users.find(u => u.userid === fid)).filter(u => u);
    }

    function renderCurrentList() {
        if (currentTab === 'chats') renderChats();
        else renderFriendsList();
    }

    function renderChats() {
        const chats = getChats();
        const container = document.getElementById('chatsList');
        if (!chats.length) {
            container.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">Нет чатов<br>Найдите пользователя</div>';
            return;
        }
        container.innerHTML = chats.map(chat => {
            const isActive = currentChat && ((chat.isSelf && currentChat.userid === currentUser.userid) || (!chat.isSelf && currentChat?.userid === chat.user.userid));
            const avatarUrl = chat.user.avatar;
            const status = userStatuses[chat.user.userid];
            const isOnline = status?.isOnline;
            const displayName = chat.isSelf ? '📝 Заметки' : getDisplayName(chat.user);
            let lastMessageText = 'Нет сообщений';
            if (chat.lastMessage) {
                if (chat.lastMessage.image) lastMessageText = '📷 Фото';
                else lastMessageText = escapeHtml(chat.lastMessage.text);
            }
            return `
                <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectChat('${chat.user.userid}', ${chat.isSelf})">
                    <div class="chat-avatar" style="${avatarUrl ? `background-image: url(${avatarUrl});` : ''}">
                        ${!avatarUrl ? (displayName.charAt(0) || 'U') : ''}
                        ${isOnline && !chat.isSelf ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(displayName)}</div>
                        <div class="chat-last">${lastMessageText}</div>
                    </div>
                    <div>
                        <div class="chat-time">${chat.lastMessage ? formatTime(chat.lastMessage.createdAt) : ''}</div>
                        ${chat.unreadCount > 0 ? `<div class="unread">${chat.unreadCount}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderFriendsList() {
        const friends = getFriends();
        const container = document.getElementById('chatsList');
        if (!friends.length) {
            container.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">👥 Нет друзей<br>Найдите и добавьте</div>';
            return;
        }
        container.innerHTML = friends.map(friend => {
            const status = userStatuses[friend.userid];
            const isOnline = status?.isOnline;
            return `
                <div class="chat-item" onclick="selectChat('${friend.userid}', false)">
                    <div class="chat-avatar" style="${friend.avatar ? `background-image: url(${friend.avatar});` : ''}">
                        ${!friend.avatar ? (friend.displayname.charAt(0) || 'U') : ''}
                        ${isOnline ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(getDisplayName(friend))}</div>
                        <div class="chat-last">@${escapeHtml(friend.username)}</div>
                    </div>
                    <button class="friend-btn remove" onclick="event.stopPropagation(); removeFriend('${friend.userid}')" style="padding:4px 8px;">➖</button>
                </div>
            `;
        }).join('');
    }

    window.removeFriend = async (userId) => {
        try {
            await apiRequest('/users/friends', 'POST', { friendId: userId, action: 'remove' });
            await loadData();
        } catch(e) { alert(e.message); }
    };

    window.selectChat = (userId, isSelf = false) => {
        if (isSelf || userId === currentUser.userid) {
            currentChat = { userid: currentUser.userid, displayname: '📝 Заметки', username: 'saved', avatar: null, isSelf: true };
        } else {
            currentChat = users.find(u => u.userid === userId);
            if (!currentChat) return;
            currentChat.isSelf = false;
        }
        renderMessages();
        renderCurrentList();
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('inputArea').style.display = 'flex';
        updateChatHeader();
        updateFriendButtons();
        document.getElementById('friendActions').style.display = currentChat.isSelf ? 'none' : 'flex';
        markMessagesAsRead(userId);
    };

    function updateChatHeader() {
        const isSelf = currentChat.isSelf || currentChat.userid === currentUser.userid;
        const displayName = isSelf ? '📝 Заметки' : getDisplayName(currentChat);
        const avatarEl = document.getElementById('chatAvatar');
        if (currentChat.avatar) {
            avatarEl.style.backgroundImage = `url(${currentChat.avatar})`;
            avatarEl.innerText = '';
        } else {
            avatarEl.style.backgroundImage = '';
            avatarEl.innerText = displayName.charAt(0).toUpperCase();
        }
        document.getElementById('chatName').innerText = displayName;
        document.getElementById('chatUsername').innerHTML = isSelf ? 'Ваши личные заметки' : `@${currentChat.username}`;
    }

    async function markMessagesAsRead(fromId) {
        try {
            await apiRequest('/messages/read', 'POST', { from: fromId });
            await loadData();
            if (currentChat && (currentChat.userid === fromId || (fromId === currentUser.userid && currentChat.isSelf))) {
                renderMessages();
            }
        } catch(e) {}
    }

    function renderMessages() {
        if (!currentChat) return;
        const isSelfChat = currentChat.isSelf || currentChat.userid === currentUser.userid;
        const chatMessages = messages.filter(m => 
            (m.from === currentUser.userid && m.to === (isSelfChat ? currentUser.userid : currentChat.userid)) ||
            (m.to === currentUser.userid && m.from === (isSelfChat ? currentUser.userid : currentChat.userid))
        ).sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));

        const container = document.getElementById('messages');
        if (!chatMessages.length) {
            container.innerHTML = `<div style="text-align:center;color:#999;margin-top:50px;">${isSelfChat ? '📝 Пишите заметки' : '💬 Напишите первое сообщение'}</div>`;
            return;
        }
        
        // Сохраняем предыдущее количество для анимации
        const oldCount = container.children.length;
        
        container.innerHTML = chatMessages.map((msg, index) => {
            const hasImage = msg.image && msg.image.startsWith('data:image');
            const displayText = msg.text && msg.text !== '📷 Фото' && msg.text !== '📷 Изображение' ? escapeHtml(msg.text) : '';
            const isOwn = msg.from === currentUser.userid;
            const isNew = index >= oldCount;
            const animationClass = isNew ? (isOwn ? 'animate-sent' : 'animate-received') : '';
            
            return `
                <div class="message ${isOwn ? 'sent' : 'received'} ${animationClass}">
                    <div class="message-bubble">
                        ${displayText ? `<div class="message-text">${displayText}</div>` : ''}
                        ${hasImage ? `<img src="${msg.image}" class="message-image" onclick="window.open('${msg.image}')" loading="lazy">` : ''}
                        <div class="message-time">${formatTime(msg.createdAt)}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        container.scrollTop = container.scrollHeight;
    }

    function formatTime(iso) {
        const date = new Date(iso);
        const now = new Date();
        return (now - date < 86400000) ? date.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) : date.toLocaleDateString('ru-RU');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            if (currentUser) {
                await loadData();
                if (currentChat) renderMessages();
            }
        }, 3000);
    }

    function searchUsers() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const resultsDiv = document.getElementById('searchResults');
        if (!query) { resultsDiv.style.display = 'none'; return; }
        const results = users.filter(u => u.userid !== currentUser.userid && (u.username.includes(query) || u.displayname.toLowerCase().includes(query)));
        if (results.length) {
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = results.map(u => `
                <div class="search-result" onclick="selectChat('${u.userid}', false); document.getElementById('searchInput').value=''; resultsDiv.style.display='none';">
                    <div class="chat-avatar" style="${u.avatar ? `background-image: url(${u.avatar});` : ''} width:40px;height:40px;">${!u.avatar ? u.displayname.charAt(0) : ''}</div>
                    <div><strong>${escapeHtml(u.displayname)}</strong><br><small>@${escapeHtml(u.username)}</small></div>
                </div>
            `).join('');
        } else {
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div style="padding:10px;text-align:center;">Не найдено</div>';
        }
    }

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach((t, i) => {
            if ((tab === 'chats' && i === 0) || (tab === 'friends' && i === 1)) t.classList.add('active');
            else t.classList.remove('active');
        });
        renderCurrentList();
    };

    const saved = localStorage.getItem('vexa_user');
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            apiRequest('/users').then(() => {
                document.getElementById('authModal').classList.remove('active');
                document.getElementById('app').style.display = 'flex';
                loadData().then(() => { updateUI(); startPolling(); });
            }).catch(() => {
                localStorage.removeItem('vexa_user');
                document.getElementById('authModal').classList.add('active');
            });
        } catch(e) {
            localStorage.removeItem('vexa_user');
            document.getElementById('authModal').classList.add('active');
        }
    } else {
        document.getElementById('authModal').classList.add('active');
    }

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(searchUsers, 300);
    });
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    window.addEventListener('beforeunload', async () => {
        if (currentUser) {
            await fetch(`${API}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${currentUser.token}` } });
        }
    });
</script>
</body>
</html>
